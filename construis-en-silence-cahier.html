<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construis en Silence - Cahier Interactif</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f1e8;
            --bg-secondary: #ebe4d8;
            --bg-tertiary: #ddd2c0;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --accent-primary: #C9A84C;
            --accent-secondary: #A67C2E;
            --border-color: #d6c7ae;
            --success: #059669;
            --danger: #dc2626;
            --bg-gradient: rgba(201, 168, 76, 0.12);
            --header-bg: rgba(245, 241, 232, 0.97);
            --section-badge-bg: rgba(201, 168, 76, 0.15);
            --textarea-bg: rgba(235, 228, 216, 0.8);
            --textarea-focus-bg: rgba(235, 228, 216, 0.95);
            --pledge-bg: rgba(200, 185, 160, 0.4);
            --tracker-day-bg: rgba(221, 210, 192, 0.6);
            --tracker-hover-bg: rgba(201, 168, 76, 0.2);
            --nav-bg: rgba(245, 241, 232, 0.97);
        }

        [data-theme="dark"] {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --accent-primary: #8b5cf6;
            --accent-secondary: #3b82f6;
            --border-color: #2a2a2a;
            --success: #10b981;
            --danger: #ef4444;
            --bg-gradient: rgba(139, 92, 246, 0.08);
            --header-bg: rgba(10, 10, 10, 0.95);
            --section-badge-bg: rgba(139, 92, 246, 0.15);
            --textarea-bg: rgba(20, 20, 20, 0.8);
            --textarea-focus-bg: rgba(30, 30, 30, 0.95);
            --pledge-bg: rgba(0, 0, 0, 0.5);
            --tracker-day-bg: rgba(20, 20, 20, 0.5);
            --tracker-hover-bg: rgba(139, 92, 246, 0.2);
            --nav-bg: rgba(10, 10, 10, 0.95);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, var(--bg-gradient) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            padding: 1.5rem 1rem;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: inherit;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.35);
        }

        .btn-primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .btn-primary:hover {
            background: #A67C2E;
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.5);
        }

        .btn-danger {
            color: var(--danger);
        }

        .progress-container {
            margin-top: 1rem;
        }

        .progress-bar {
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(201, 168, 76, 0.4);
        }

        .progress-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* Main Content */
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 10rem 1rem 8rem;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: var(--section-badge-bg);
            border: 1px solid rgba(201, 168, 76, 0.5);
            border-radius: 20px;
            color: var(--accent-primary);
            font-size: 0.75rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
        }

        .section-title {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.35);
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .quote {
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
            font-style: italic;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        /* Questions Section */
        .questions-header {
            font-size: 1.2rem;
            color: var(--accent-primary);
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }

        .question-block {
            margin-bottom: 3rem;
        }

        .question-label {
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            background: var(--textarea-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--textarea-focus-bg);
            box-shadow: 0 0 0 3px var(--tracker-hover-bg);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        /* Challenge Section */
        .challenge-box {
            background: var(--challenge-bg, linear-gradient(135deg, var(--section-badge-bg), var(--tracker-hover-bg)));
            border: 1px solid rgba(201, 168, 76, 0.5);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 3rem;
            box-shadow: 0 8px 32px rgba(201, 168, 76, 0.08);
        }

        .challenge-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 8px rgba(201, 168, 76, 0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .challenge-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .challenge-desc {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* Pledge Section */
        .pledge-box {
            background: var(--pledge-bg);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid rgba(201, 168, 76, 0.35);
            margin-bottom: 2rem;
        }

        .pledge-title {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--accent-primary);
        }

        .pledge-item {
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
        }

        .pledge-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            font-style: italic;
            color: var(--accent-primary);
            font-size: 0.9rem;
        }

        /* Tracker */
        .tracker-container {
            margin-top: 2rem;
        }

        .tracker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .tracker-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        .tracker-progress {
            font-size: 0.85rem;
            color: var(--accent-primary);
        }

        .tracker-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .tracker-day {
            aspect-ratio: 1;
            border: 2px solid var(--border-color);
            background: var(--tracker-day-bg);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .tracker-day:hover {
            border-color: var(--accent-primary);
            background: var(--tracker-hover-bg);
            transform: scale(1.05);
        }

        .tracker-day.completed {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.4);
        }

        .notes-section {
            margin-top: 2rem;
        }

        .notes-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .notes-textarea {
            min-height: 100px;
        }

        /* Navigation */
        .nav-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding: 1rem;
            z-index: 1000;
        }

        .nav-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-dots {
            display: flex;
            gap: 0.4rem;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-dot:hover {
            background: var(--text-muted);
            transform: scale(1.2);
        }

        .nav-dot.active {
            background: var(--accent-primary);
            width: 24px;
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(201, 168, 76, 0.5);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Icons */
        .icon {
            width: 18px;
            height: 18px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .section-title {
                font-size: 2rem;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .challenge-box {
                padding: 1.5rem;
            }

            .btn span {
                display: none;
            }
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* ============ MINDFORGE BRANDING ============ */
        .mindforge-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .mindforge-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .brand-text h1 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #C9A84C, #F0D060, #C9A84C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-text p {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        /* Footer branding */
        .footer-brand {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            padding-top: 0.4rem;
        }
        .footer-brand span {
            background: linear-gradient(135deg, #C9A84C, #F0D060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        /* ============ PDF PRINT STYLES ============ */
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: #f5f1e8 !important; color: #1f2937 !important; }
            .header { position: relative !important; break-inside: avoid; }
            .nav-footer { display: none !important; }
            .main { padding: 2rem 1rem !important; }
            .section-block { break-inside: avoid; page-break-inside: avoid; }
            .question-block { break-inside: avoid; }
            .challenge-box { break-inside: avoid; }
            textarea { min-height: 80px !important; border: 1px solid #d6c7ae !important; background: #ebe4d8 !important; color: #1f2937 !important; }
            .tracker-day { border: 2px solid #d6c7ae !important; background: #ddd2c0 !important; color: #6b7280 !important; }
            .tracker-day.completed { background: #C9A84C !important; color: white !important; }
            .pdf-footer { display: flex !important; }
            .btn-pdf-print { display: none !important; }
        }

        /* PDF footer (visible only in print) */
        .pdf-footer {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1rem 1rem;
            border-top: 1px solid #2a2a2a;
            margin-top: 2rem;
        }
        .pdf-footer-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .pdf-footer-logo img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .pdf-footer-logo span {
            font-size: 0.85rem;
            background: linear-gradient(135deg, #C9A84C, #F0D060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .pdf-footer-handle {
            font-size: 0.78rem;
            color: #666;
            letter-spacing: 0.08em;
        }
        .pdf-footer-handle span {
            background: linear-gradient(135deg, #C9A84C, #F0D060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
    </style>
</head>

        // State management
        let currentSection = 0;
        let responses = {};
        let trackers = {};

        // Initialize app
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('construisEnSilence_theme', isDark ? 'light' : 'dark');
            render();
        }

        // Initialize app
        function init() {
            const savedTheme = localStorage.getItem('construisEnSilence_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            loadData();
            render();
        }

        // Load data from localStorage
        function loadData() {
            const savedResponses = localStorage.getItem('buildInSilence_responses_dark');
            const savedTrackers = localStorage.getItem('buildInSilence_trackers_dark');
            
            if (savedResponses) responses = JSON.parse(savedResponses);
            if (savedTrackers) trackers = JSON.parse(savedTrackers);
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('buildInSilence_responses_dark', JSON.stringify(responses));
            localStorage.setItem('buildInSilence_trackers_dark', JSON.stringify(trackers));
        }

        // Save response
        function saveResponse(key, value) {
            responses[key] = value;
            saveData();
        }

        // Toggle tracker day
        function toggleDay(section, day) {
            const key = `s${section}_tracker`;
            if (!trackers[key]) trackers[key] = [];
            
            const index = trackers[key].indexOf(day);
            if (index > -1) {
                trackers[key].splice(index, 1);
            } else {
                trackers[key].push(day);
            }
            
            saveData();
            render();
        }

        // Navigate to section
        function goToSection(index) {
            currentSection = index;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

                trackers = {};
                localStorage.removeItem('buildInSilence_responses_dark');
                localStorage.removeItem('buildInSilence_trackers_dark');
                render();
            }
        }

                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                    </svg>
                                    <span>Réinit.</span>
                                </button>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            <div class="progress-text">
                                Partie ${currentSection + 1} sur ${SECTIONS.length} • ${progress}% Complété
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="main">
                    <div class="section-badge">PARTIE ${String(currentSection + 1).padStart(2, '0')}</div>
                    <h2 class="section-title">${section.title}</h2>
                    <p class="section-subtitle">${section.subtitle}</p>
                    <div class="quote">"${section.quote}"</div>

                    <!-- Questions -->
                    <div class="questions-section">
                        <h3 class="questions-header">QUESTIONS DE RÉFLEXION</h3>
                        ${section.questions.map((q, qIdx) => `
                            <div class="question-block">
                                <label class="question-label">Q${qIdx + 1}: ${q}</label>
                                <textarea 
                                    placeholder="Écrivez honnêtement — personne ne lira ceci sauf vous..."
                                    oninput="saveResponse('s${currentSection}_q${qIdx}', this.value)"
                                >${responses[`s${currentSection}_q${qIdx}`] || ''}</textarea>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Challenge -->
                    <div class="challenge-box">
                        <div class="challenge-header">
                            <div class="pulse-dot"></div>
                            <span style="font-size: 0.9rem; color: var(--accent-primary); letter-spacing: 0.1em;">DÉFI</span>
                        </div>
                        <h3 class="challenge-title">${section.challenge}</h3>
                        <p class="challenge-desc">${section.challengeDesc}</p>

                        ${section.isPledge ? `
                            <div class="pledge-box">
                                <div class="pledge-title">L'ENGAGEMENT</div>
                                ${PLEDGE_ITEMS.map(item => `
                                    <div class="pledge-item">• ${item}</div>
                                `).join('')}
                                <div class="pledge-footer">
                                    "Que votre croissance soit le mystère.<br>Que votre succès soit le bruit."
                                </div>
                            </div>
                        ` : ''}

                        <!-- Tracker -->
                        <div class="tracker-container">
                            <div class="tracker-header">
                                <div class="tracker-label">SUIVI QUOTIDIEN</div>
                                <div class="tracker-progress">${completedDays.length} / ${section.challengeDays} jours</div>
                            </div>
                            <div class="tracker-grid">
                                ${Array.from({ length: section.challengeDays }).map((_, day) => {
                                    const isCompleted = completedDays.includes(day);
                                    return `
                                        <button 
                                            class="tracker-day ${isCompleted ? 'completed' : ''}"
                                            onclick="toggleDay(${currentSection}, ${day})"
                                        >
                                            ${isCompleted ? '✓' : day + 1}
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Notes -->
                        <div class="notes-section">
                            <div class="notes-label">Notes :</div>
                            <textarea 
                                class="notes-textarea"
                                placeholder="Notez vos observations et vos prises de conscience..."
                                oninput="saveResponse('s${currentSection}_notes', this.value)"
                            >${responses[`s${currentSection}_notes`] || ''}</textarea>
                        </div>
